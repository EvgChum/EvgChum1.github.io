<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Выбор значка сайта</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #0b1020;
      color: #e5e7eb;
      padding: 24px;
    }
    h1 { margin-top: 0; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 18px;
      max-width: 860px;
    }
    .card {
      background: #121a2e;
      border: 1px solid #2d3a62;
      border-radius: 14px;
      padding: 14px;
      text-align: center;
    }
    img {
      width: 128px;
      height: 128px;
      border-radius: 20px;
      display: block;
      margin: 0 auto 10px;
    }
    .name { color: #fda4af; font-weight: 600; }
  </style>
</head>
<body>
  <h1>Варианты значка сайта</h1>
  <p>Выбери вариант: A, B, C, D, E, F, G или H. Потом поставлю его как основной favicon.</p>
  <div class="grid">
    <div class="card"><img src="icons/icon-a.svg" alt="icon a"><div class="name">Вариант A</div></div>
    <div class="card"><img src="icons/icon-b.svg" alt="icon b"><div class="name">Вариант B</div></div>
    <div class="card"><img src="icons/icon-c.svg" alt="icon c"><div class="name">Вариант C</div></div>
    <div class="card"><img src="icons/icon-d.svg" alt="icon d"><div class="name">Вариант D</div></div>
    <div class="card"><img src="icons/icon-e.svg" alt="icon e"><div class="name">Вариант E</div></div>
    <div class="card"><img src="icons/icon-f.svg" alt="icon f"><div class="name">Вариант F</div></div>
    <div class="card"><img src="icons/icon-g.svg" alt="icon g"><div class="name">Вариант G</div></div>
    <div class="card"><img src="icons/icon-h.svg" alt="icon h"><div class="name">Вариант H</div></div>
  </div>
</body>
</html>
